# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Accessibility Linter (CAAL)

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  a11y-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install User App Dependencies
        # Replace with your app's actual directory if different (e.g., ./frontend)
        run: npm ci

      - name: Build User App (if applicable)
        run: npm run build --if-present

      - name: Start Local Dev Server
        # Starts the app in the background. Adjust the start command and port if necessary.
        run: |
          npm run start &
          # Wait for the server to be ready on port 3000
          npx wait-on http://localhost:3000

      - name: Setup DTP_CAAL CLI
        run: |
          cd DTP_CAAL/cli
          npm ci
          npm run build
          npx playwright install --with-deps chromium

      - name: Run Accessibility Audit with Auto-Fix
        id: a11y_audit
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd DTP_CAAL/cli
          node dist/index.js --url http://localhost:3000 --output ../../caal-report.md --format md --auto-fix --src-dir ../../
      
      - name: Generate Git Diff for Fixes
        id: git_diff
        run: |
          git diff > caal-fix.patch
          # We check if there's any content in the patch
          if [ -s caal-fix.patch ]; then
            echo "has_fixes=true" >> $GITHUB_OUTPUT
          else
            echo "has_fixes=false" >> $GITHUB_OUTPUT
          fi

      - name: Post PR Comment on Failure
        if: steps.a11y_audit.outcome == 'failure' || steps.git_diff.outputs.has_fixes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            try {
              const report = fs.existsSync('caal-report.md') ? fs.readFileSync('caal-report.md', 'utf8') : 'Report missing.';
              const patch = fs.existsSync('caal-fix.patch') ? fs.readFileSync('caal-fix.patch', 'utf8') : '';
              
              let body = `## 🚨 Accessibility Audit Failed 🚨\n\n${report}`;
              
              if (patch) {
                body += `\n\n### 🛠️ Automated Fixes Available\n\n`;
                body += `I have generated automated source code fixes for these issues! The changed files have been left uncommitted for you to verify manually.\n`;
                body += `> **Action Required:** Please review the diff below and apply the changes to your branch, or run \`npx a11y-audit --auto-fix\` locally.\n\n`;
                body += `<details><summary>View Git Diff</summary>\n\n\`\`\`diff\n${patch}\n\`\`\`\n\n</details>`;
              }
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
              
              // Fail the workflow if issues were found
              core.setFailed('Accessibility issues were found.');
            } catch (error) {
              console.log('Could not read report or post comment.', error);
              core.setFailed('Failed to process accessibility report.');
            }
