services:
  - type: web
    name: dtp-caal-backend
    env: node
    rootDir: DTP_CAAL/backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: GROQ_API_KEY
        sync: false
